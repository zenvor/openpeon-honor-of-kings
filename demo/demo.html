<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honor of Kings - Sound Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gold: #C8A84E;
  --gold-bright: #FFD700;
  --gold-dark: #8B6914;
  --gold-hot: #FFAA00;
  --bg-dark: #060810;
  --bg-panel: rgba(8, 10, 22, 0.96);
  --border-gold: rgba(200, 168, 78, 0.25);
  --text-dim: rgba(200, 190, 160, 0.5);
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Noto Serif SC', serif;
  background: var(--bg-dark);
  color: #d4c9a8;
}

body {
  display: flex;
  flex-direction: column;
  background:
    radial-gradient(ellipse 80% 60% at 50% 20%, rgba(20, 30, 60, 0.7) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(15, 8, 30, 0.5) 0%, transparent 60%),
    linear-gradient(180deg, #060810 0%, #0a0e1e 40%, #0d1220 100%);
}

/* Noise texture */
body::before {
  content: '';
  position: fixed; inset: 0;
  opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* ====== LAYOUT ====== */
.app-container {
  display: flex; flex: 1; min-height: 0;
  position: relative; z-index: 1;
}

/* ====== LEFT PANEL ====== */
.side-panel {
  width: 280px; min-width: 280px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border-gold);
  display: flex; flex-direction: column;
  overflow: hidden; position: relative;
  box-shadow: inset -1px 0 30px rgba(200, 168, 78, 0.03);
  z-index: 10;
}

.side-panel::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(200, 168, 78, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(200, 168, 78, 0.025) 1px, transparent 1px);
  background-size: 24px 24px;
  pointer-events: none; z-index: 0;
}

.side-panel::after {
  content: '';
  position: absolute; top: 0; right: -1px;
  width: 2px; height: 100%;
  background: linear-gradient(180deg, transparent 5%, rgba(200,168,78,0.2) 30%, rgba(200,168,78,0.2) 70%, transparent 95%);
}

.panel-header {
  padding: 18px 16px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border-gold);
  flex-shrink: 0;
  position: relative; z-index: 1;
  background: linear-gradient(180deg, rgba(200,168,78,0.04), transparent);
}

.panel-header h2 {
  font-family: 'Zhi Mang Xing', 'Ma Shan Zheng', cursive;
  font-size: 24px;
  background: linear-gradient(135deg, #FFFDEB, var(--gold-bright), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 6px;
  filter: drop-shadow(0 0 8px rgba(200,168,78,0.3));
}

.panel-header .subtitle {
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 3px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.sound-list {
  flex: 1; overflow-y: auto;
  padding: 6px 0;
  scrollbar-width: thin;
  scrollbar-color: var(--gold-dark) transparent;
  position: relative; z-index: 1;
}

.sound-list::-webkit-scrollbar { width: 3px; }
.sound-list::-webkit-scrollbar-track { background: transparent; }
.sound-list::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

.category-group { margin-bottom: 1px; }

.category-header {
  display: flex; align-items: center;
  padding: 9px 12px;
  cursor: pointer; user-select: none;
  transition: background 0.2s;
  border-left: 2px solid transparent;
}

.category-header:hover {
  background: rgba(200, 168, 78, 0.05);
  border-left-color: var(--gold);
}

.category-header .arrow {
  width: 14px; height: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--gold);
  transition: transform 0.25s ease;
  flex-shrink: 0; margin-right: 7px;
}

.category-header .arrow.collapsed { transform: rotate(-90deg); }

.category-header .cat-name {
  font-size: 12px; font-weight: 700; color: var(--gold);
  flex: 1; letter-spacing: 1px;
}

.category-header .cat-count {
  font-size: 9px; color: var(--text-dim); margin-right: 6px;
  background: rgba(200,168,78,0.08);
  padding: 1px 5px; border-radius: 3px;
}

.category-header .select-all-btn {
  font-size: 9px; padding: 2px 7px;
  border: 1px solid rgba(200,168,78,0.2);
  background: transparent; color: var(--text-dim);
  cursor: pointer; border-radius: 2px;
  transition: all 0.2s; font-family: inherit;
}

.category-header .select-all-btn:hover {
  border-color: var(--gold); color: var(--gold);
  background: rgba(200, 168, 78, 0.06);
}

.category-sounds { overflow: hidden; transition: max-height 0.3s ease; }
.category-sounds.collapsed { max-height: 0 !important; }

.sound-item {
  display: flex; align-items: center;
  padding: 5px 12px 5px 34px;
  cursor: pointer; transition: all 0.15s; gap: 7px;
  border-left: 3px solid transparent;
}

.sound-item:hover { background: rgba(200, 168, 78, 0.04); }

.sound-item.now-playing {
  background: linear-gradient(90deg, rgba(200, 168, 78, 0.18), transparent 80%);
  border-left: 3px solid var(--gold-bright);
}

.sound-item.now-playing .sound-label { color: var(--gold-bright); }

.sound-item input[type="checkbox"] {
  appearance: none; width: 13px; height: 13px;
  border: 1px solid rgba(200, 168, 78, 0.3);
  background: rgba(10, 14, 30, 0.6);
  cursor: pointer; flex-shrink: 0; position: relative;
  transition: all 0.2s;
}

.sound-item input[type="checkbox"]:checked {
  border-color: var(--gold);
  background: rgba(200, 168, 78, 0.15);
}

.sound-item input[type="checkbox"]:checked::after {
  content: '';
  position: absolute; left: 3px; top: 1px;
  width: 4px; height: 7px;
  border: solid var(--gold);
  border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg);
}

.sound-item .sound-label {
  font-size: 11.5px; color: rgba(200, 190, 160, 0.7);
  line-height: 1.4; flex: 1;
}

.sound-item:hover .sound-label { color: #d4c9a8; }

.sound-item .play-single {
  opacity: 0; width: 18px; height: 18px;
  border: none; background: transparent; color: var(--gold);
  cursor: pointer; font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s; flex-shrink: 0;
}

.sound-item:hover .play-single { opacity: 0.5; }
.sound-item .play-single:hover { opacity: 1; }

/* ====== MAIN DISPLAY ====== */
.main-display {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

/* Corner ornaments - bigger, bolder */
.corner-ornament {
  position: absolute; width: 80px; height: 80px;
  pointer-events: none;
}

.corner-ornament::before, .corner-ornament::after {
  content: ''; position: absolute;
}

.corner-ornament.tl {
  top: 16px; left: 16px;
  border-top: 2px solid rgba(200,168,78,0.15);
  border-left: 2px solid rgba(200,168,78,0.15);
}
.corner-ornament.tl::before {
  top: 8px; left: 8px; width: 30px; height: 30px;
  border-top: 1px solid rgba(200,168,78,0.08);
  border-left: 1px solid rgba(200,168,78,0.08);
}

.corner-ornament.br {
  bottom: 16px; right: 16px;
  border-bottom: 2px solid rgba(200,168,78,0.15);
  border-right: 2px solid rgba(200,168,78,0.15);
}
.corner-ornament.br::before {
  bottom: 8px; right: 8px; width: 30px; height: 30px;
  border-bottom: 1px solid rgba(200,168,78,0.08);
  border-right: 1px solid rgba(200,168,78,0.08);
}

/* Center diamond */
.center-diamond {
  position: absolute;
  width: 220px; height: 220px;
  border: 1px solid rgba(200, 168, 78, 0.05);
  transform: rotate(45deg);
  pointer-events: none;
}

.center-diamond::before {
  content: '';
  position: absolute; inset: 22px;
  border: 1px solid rgba(200, 168, 78, 0.035);
}

/* Idle breathing glow */
.idle-glow {
  position: absolute;
  width: 300px; height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200,168,78,0.03) 0%, transparent 70%);
  pointer-events: none;
  animation: breathe 4s ease-in-out infinite;
}

@keyframes breathe {
  0%, 100% { transform: scale(0.8); opacity: 0.5; }
  50% { transform: scale(1.2); opacity: 1; }
}

/* Ambient glow */
.ambient-glow {
  position: absolute;
  width: 700px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(200, 168, 78, 0.04) 0%, transparent 70%);
  pointer-events: none; opacity: 0;
  transition: opacity 0.4s;
}

.ambient-glow.active { opacity: 1; }

#bgParticles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
}

/* Darkness overlay */
#darknessOverlay {
  position: absolute; inset: 0;
  background: #000; opacity: 0;
  pointer-events: none; z-index: 5;
  transition: opacity 0.12s;
}

/* Effect container */
#effectContainer {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 10;
}

/* DUAL-LAYER TEXT: shadow layer underneath, gradient layer on top */
.effect-text-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  opacity: 0;
  z-index: 20;
  will-change: transform, opacity, filter;
  transform: translateZ(0);
}

.effect-text-shadow {
  font-family: 'Zhi Mang Xing', 'Ma Shan Zheng', cursive;
  text-align: center;
  white-space: nowrap;
  position: absolute;
  color: rgba(0,0,0,0);
  pointer-events: none;
  will-change: transform;
  padding: 0.2em 0.3em;
  line-height: 1.1;
}

.effect-text {
  font-family: 'Zhi Mang Xing', 'Ma Shan Zheng', cursive;
  text-align: center;
  white-space: nowrap;
  position: relative;
  will-change: transform, filter;
  padding: 0.2em 0.3em;
  line-height: 1.1;
}

/* Idle hint */
.idle-hint {
  font-family: 'Zhi Mang Xing', 'Ma Shan Zheng', cursive;
  font-size: 22px;
  color: rgba(200, 168, 78, 0.15);
  letter-spacing: 8px;
  text-align: center;
  line-height: 2;
}

/* Flash overlay */
#flashOverlay {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 100;
  opacity: 0;
}

/* Halo rings */
.halo-ring {
  position: absolute; border-radius: 50%;
  border: 2px solid; pointer-events: none; opacity: 0;
  z-index: 15;
}

.slash-strike {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 160vw;
  height: 6px;
  background: linear-gradient(90deg, transparent 15%, #ffffff 50%, transparent 85%);
  box-shadow: 0 0 30px 8px rgba(255, 100, 0, 0.8), 0 0 80px 20px rgba(255, 200, 50, 0.5);
  z-index: 17;
  pointer-events: none;
  opacity: 0;
  transform: translate(-50%, -50%) rotate(-25deg) scaleX(0) scaleY(0.2);
  animation: slashAnim 0.35s 0.09s ease-out both;
  will-change: transform, opacity;
}

.slash-strike::before {
  content: '';
  position: absolute;
  inset: -1px 30%;
  background: #ffffff;
  border-radius: 50%;
  box-shadow: 0 0 10px #ffffff, 0 0 20px rgba(255,255,255,0.8);
}

/* ====== BOTTOM CONTROLS ====== */
.bottom-bar {
  height: 70px; min-height: 70px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border-gold);
  display: flex; align-items: center; justify-content: center;
  gap: 20px; padding: 0 30px;
  position: relative; z-index: 2;
  box-shadow: inset 0 1px 30px rgba(200,168,78,0.03);
}

.bottom-bar::before {
  content: '';
  position: absolute; top: -1px; left: 10%; right: 10%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(200,168,78,0.25), transparent);
}

.ctrl-btn {
  font-family: 'Zhi Mang Xing', 'Ma Shan Zheng', cursive;
  font-size: 18px; padding: 10px 36px;
  border: 1px solid var(--border-gold);
  background: linear-gradient(180deg, rgba(200,168,78,0.08), rgba(200,168,78,0.02));
  color: var(--gold); cursor: pointer;
  letter-spacing: 4px;
  transition: all 0.25s;
  position: relative; overflow: hidden;
}

.ctrl-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,215,0,0.06), transparent);
  opacity: 0; transition: opacity 0.2s;
}

.ctrl-btn:hover::after { opacity: 1; }

.ctrl-btn:hover {
  border-color: var(--gold);
  box-shadow: 0 0 20px rgba(200, 168, 78, 0.12), inset 0 0 20px rgba(200,168,78,0.05);
}

.ctrl-btn:active { transform: scale(0.97); }

.ctrl-btn.playing {
  border-color: var(--gold-bright);
  box-shadow: 0 0 25px rgba(255, 215, 0, 0.2), inset 0 0 15px rgba(255,215,0,0.05);
  background: linear-gradient(180deg, rgba(200,168,78,0.15), rgba(200,168,78,0.05));
}

.ctrl-btn.stop-btn { color: #a08060; border-color: rgba(160, 128, 96, 0.2); }
.ctrl-btn.stop-btn:hover { border-color: rgba(160,128,96,0.5); color: #c09870; }

.interval-control { display: flex; align-items: center; gap: 10px; }

.interval-control label {
  font-size: 12px; color: var(--text-dim); letter-spacing: 1px;
}

.interval-control input[type="range"] {
  width: 130px; height: 2px;
  appearance: none;
  background: linear-gradient(90deg, rgba(139,105,20,0.4), var(--gold));
  border-radius: 1px; outline: none; cursor: pointer;
}

.interval-control input[type="range"]::-webkit-slider-thumb {
  appearance: none;
  width: 14px; height: 14px; border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, var(--gold-bright), var(--gold-dark));
  border: 2px solid var(--bg-dark);
  box-shadow: 0 0 8px rgba(200,168,78,0.5);
  cursor: pointer;
}

.interval-control .interval-val {
  font-size: 12px; color: var(--gold);
  width: 60px; text-align: right;
  font-family: 'Noto Serif SC', serif;
}

/* Toggle switch */
.toggle-control {
  display: flex; align-items: center; gap: 8px;
}

.toggle-control label {
  font-size: 12px; color: var(--text-dim); letter-spacing: 1px;
  cursor: pointer; user-select: none;
}

.toggle-switch {
  position: relative; width: 36px; height: 18px;
  appearance: none; background: rgba(200,168,78,0.15);
  border: 1px solid rgba(200,168,78,0.3);
  border-radius: 9px; cursor: pointer;
  transition: all 0.25s; outline: none;
}

.toggle-switch::after {
  content: '';
  position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--text-dim);
  transition: all 0.25s;
}

.toggle-switch:checked {
  background: rgba(200,168,78,0.3);
  border-color: var(--gold);
}

.toggle-switch:checked::after {
  left: 20px;
  background: var(--gold-bright);
  box-shadow: 0 0 6px rgba(255,215,0,0.5);
}

/* ====== ANIMATIONS ====== */

@keyframes normalIn {
  0% { opacity: 0; transform: scale(1.8) rotate(3deg); filter: brightness(1.2); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
  6% { opacity: 1; transform: scale(1.02) rotate(0deg); filter: brightness(1); animation-timing-function: cubic-bezier(0.1, 0.9, 0.3, 1); }
  75% { opacity: 1; transform: scale(0.97); }
  100% { opacity: 0; transform: scale(1.1); }
}

@keyframes doubleKill {
  0% { opacity: 0; transform: scale(1.9) rotate(-3deg); filter: brightness(1.5); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
  5% { opacity: 1; transform: scale(1.03) rotate(0deg); filter: brightness(1.2); animation-timing-function: cubic-bezier(0.1, 0.9, 0.3, 1); }
  10% { filter: brightness(1); }
  70% { opacity: 1; transform: scale(0.96); filter: brightness(1); }
  100% { opacity: 0; transform: scale(1.1); }
}

@keyframes tripleKill {
  0% { opacity: 0; transform: scale(2.0) rotate(4deg); filter: brightness(1.8); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
  5% { opacity: 1; transform: scale(1.04) rotate(0deg); filter: brightness(1.5); animation-timing-function: cubic-bezier(0.1, 0.9, 0.3, 1); }
  12% { filter: brightness(1); }
  70% { opacity: 1; transform: scale(0.95); filter: brightness(1); }
  100% { opacity: 0; transform: scale(1.1); }
}

@keyframes quadraKill {
  0% { opacity: 0; transform: scale(2.2) rotate(-5deg); filter: brightness(2.2); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
  4% { opacity: 1; transform: scale(1.06) rotate(0deg); filter: brightness(1.8); animation-timing-function: cubic-bezier(0.1, 0.9, 0.3, 1); }
  15% { filter: brightness(1); }
  65% { opacity: 1; transform: scale(0.94); filter: brightness(1); }
  100% { opacity: 0; transform: scale(1.1); }
}

@keyframes pentaKill {
  0% { opacity: 0; transform: scale(2.4) rotate(-6deg); filter: brightness(2.8); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
  3% { opacity: 1; transform: scale(1.08) rotate(0deg); filter: brightness(2); animation-timing-function: cubic-bezier(0.1, 0.9, 0.3, 1); }
  15% { filter: brightness(1); }
  58% { opacity: 1; transform: scale(0.93); filter: brightness(1); }
  100% { opacity: 0; transform: scale(1.15); }
}

@keyframes streakEffect {
  0% { opacity: 0; transform: scale(2.3) translateX(60px); filter: brightness(2); animation-timing-function: cubic-bezier(0.8, 0, 1, 1); }
  5% { opacity: 1; transform: scale(1.05) translateX(0); filter: brightness(1.5); animation-timing-function: cubic-bezier(0.1, 0.9, 0.3, 1); }
  12% { filter: brightness(1); }
  70% { opacity: 1; transform: scale(0.95); filter: brightness(1); }
  100% { opacity: 0; transform: scale(1.1); }
}

/* Screen shakes */
@keyframes shakeLight {
  0%, 100% { transform: translate(0); }
  8% { transform: translate(-8px, 6px); }
  16% { transform: translate(10px, -8px); }
  24% { transform: translate(-8px, 4px); }
  32% { transform: translate(6px, -6px); }
  45% { transform: translate(-4px, 4px); }
  60% { transform: translate(2px, -2px); }
}

@keyframes shakeHeavy {
  0%, 100% { transform: translate(0); }
  4% { transform: translate(-15px, 12px); }
  8% { transform: translate(18px, -14px); }
  12% { transform: translate(-20px, 10px); }
  16% { transform: translate(14px, -16px); }
  22% { transform: translate(-12px, 10px); }
  30% { transform: translate(8px, -8px); }
  40% { transform: translate(-6px, 6px); }
  55% { transform: translate(3px, -2px); }
}

@keyframes shakeExtremeRGB {
  0%, 100% { transform: translate(0) rotate(0); }
  3% { transform: translate(-28px, 20px) rotate(-1deg); }
  6% { transform: translate(32px, -24px) rotate(1.5deg); }
  9% { transform: translate(-24px, 28px) rotate(-1.5deg); }
  13% { transform: translate(20px, -16px) rotate(1deg); }
  18% { transform: translate(-12px, 12px) rotate(-0.5deg); }
  26% { transform: translate(8px, -8px); }
  38% { transform: translate(-4px, 4px); }
  52% { transform: translate(2px, -2px); }
}

@keyframes flashPulse {
  0% { opacity: 1; filter: brightness(2); }
  15% { opacity: 0.5; filter: brightness(1); }
  100% { opacity: 0; }
}

@keyframes haloExpand {
  0% { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
  100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
}

@keyframes slashAnim {
  0% {
    transform: translate(-50%, -50%) rotate(-25deg) scaleX(0) scaleY(0.2);
    opacity: 0;
  }
  15% {
    transform: translate(-50%, -50%) rotate(-25deg) scaleX(1) scaleY(1.8);
    opacity: 1;
  }
  100% {
    transform: translate(-50%, -50%) rotate(-25deg) scaleX(1.6) scaleY(0);
    opacity: 0;
  }
}
</style>
</head>
<body>

<div class="app-container">
  <div class="side-panel">
    <div class="panel-header">
      <h2>Honor of Kings</h2>
      <div class="subtitle">HONOR OF KINGS SOUND PACK</div>
    </div>
    <div class="sound-list" id="soundList"></div>
  </div>

  <div class="main-display" id="mainDisplay">
    <div class="corner-ornament tl"></div>
    <div class="corner-ornament br"></div>
    <div class="center-diamond"></div>
    <div class="idle-glow" id="idleGlow"></div>
    <div class="ambient-glow" id="ambientGlow"></div>
    <canvas id="bgParticles"></canvas>
    <div id="darknessOverlay"></div>
    <div id="effectContainer">
      <div class="idle-hint" id="idleHint">
        Select sounds<br>then start demo
      </div>
    </div>
  </div>
</div>

<div id="flashOverlay"></div>

<div class="bottom-bar">
  <button class="ctrl-btn" id="btnStart" onclick="startDemo()">Start Demo</button>
  <button class="ctrl-btn stop-btn" id="btnStop" onclick="stopDemo()">Stop</button>
  <div class="toggle-control">
    <input type="checkbox" class="toggle-switch" id="skipTailToggle" checked>
    <label for="skipTailToggle">Skip tail silence</label>
  </div>
  <div class="interval-control">
    <label>Gap between tracks</label>
    <input type="range" id="intervalSlider" min="-3000" max="3000" value="0" step="25" oninput="updateIntervalDisplay()">
    <span class="interval-val" id="intervalVal">0.0s</span>
  </div>
</div>

<script>
const CATEGORY_NAMES = {
  'session.start': 'Session Start',
  'task.acknowledge': 'Task Acknowledge',
  'task.complete': 'Task Complete',
  'task.error': 'Task Error',
  'input.required': 'Input Required',
  'resource.limit': 'Resource Limit',
  'user.spam': 'User Spam',
  'task.progress': 'Task Progress',
  'session.end': 'Session End'
};

let allSounds = [];
let isPlaying = false;
let currentTimeout = null;
let currentAudio = null;
let currentIndex = 0;
let particleMultiplier = 1;
let audioCtx = null;
const realDurationCache = new Map();

function getAudioContext() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

async function detectRealDuration(src) {
  if (realDurationCache.has(src)) return realDurationCache.get(src);
  try {
    const ctx = getAudioContext();
    const resp = await fetch(src);
    const buf = await resp.arrayBuffer();
    const audioBuf = await ctx.decodeAudioData(buf);
    const sampleRate = audioBuf.sampleRate;
    // 10ms RMS window, threshold ~-40dB (perceivable silence boundary)
    const windowSize = Math.round(sampleRate * 0.01);
    const rmsThreshold = 0.01;
    let lastSoundEnd = 0;

    for (let ch = 0; ch < audioBuf.numberOfChannels; ch++) {
      const data = audioBuf.getChannelData(ch);
      // Scan from end in window steps
      for (let end = data.length; end > 0; end -= windowSize) {
        const start = Math.max(0, end - windowSize);
        let sumSq = 0;
        for (let i = start; i < end; i++) {
          sumSq += data[i] * data[i];
        }
        const rms = Math.sqrt(sumSq / (end - start));
        if (rms > rmsThreshold) {
          lastSoundEnd = Math.max(lastSoundEnd, end);
          break;
        }
      }
    }

    const realDur = lastSoundEnd / sampleRate;
    const result = Math.min(realDur + 0.02, audioBuf.duration);
    realDurationCache.set(src, result);
    return result;
  } catch (e) {
    return null;
  }
}

function isSkipTailEnabled() {
  return document.getElementById('skipTailToggle').checked;
}

function getEffectTier(label) {
  const l = label.toLowerCase();
  const isEnemy = l.startsWith('enemy');
  if (l.includes('pentakill')) return { tier: 'penta', enemy: isEnemy };
  if (l.includes('hexakill') || l.includes('heptakill')) return { tier: 'penta', enemy: isEnemy };
  if (l.includes('quadra kill')) return { tier: 'quadra', enemy: isEnemy };
  if (l.includes('triple kill')) return { tier: 'triple', enemy: isEnemy };
  if (l.includes('double kill')) return { tier: 'double', enemy: isEnemy };
  if (l.includes('killing spree') || l.includes('rampage') || l.includes('unstoppable') ||
      l.includes('off to kill') || l.includes('ought to kill') || l.includes('up to kill') ||
      l.includes('legendary') || l.includes('godlike')) {
    return { tier: 'streak', enemy: isEnemy };
  }
  return { tier: 'normal', enemy: false };
}

async function init() {
  initParticles();
  try {
    const resp = await fetch('../openpeon.json', { cache: 'no-store' });
    if (!resp.ok) {
      throw new Error(`openpeon.json -> ${resp.status}`);
    }
    const data = await resp.json();
    buildSoundList(data.categories);
  } catch (e) {
    document.getElementById('soundList').innerHTML =
      '<div style="padding:20px;color:#a08060;font-size:13px;">Load failed: ' + e.message + '</div>';
  }
}

function buildSoundList(categories) {
  const container = document.getElementById('soundList');
  let html = '';
  let soundIndex = 0;

  for (const [catKey, catData] of Object.entries(categories)) {
    const catName = CATEGORY_NAMES[catKey] || catKey;
    const sounds = catData.sounds;
    const groupId = 'cat-' + catKey.replace(/\./g, '-');

    html += `<div class="category-group">
      <div class="category-header" onclick="toggleCategory('${groupId}', this)">
        <span class="arrow">&#9662;</span>
        <span class="cat-name">${catName}</span>
        <span class="cat-count">${sounds.length}</span>
        <button class="select-all-btn" onclick="event.stopPropagation(); toggleSelectAll('${groupId}', this)">Select all</button>
      </div>
      <div class="category-sounds" id="${groupId}">`;

    for (const sound of sounds) {
      const idx = soundIndex++;
      allSounds.push({
        file: sound.file,
        src: '../' + sound.file,
        label: sound.label,
        index: idx
      });
      html += `<div class="sound-item" id="item-${idx}">
        <input type="checkbox" id="cb-${idx}" data-index="${idx}">
        <span class="sound-label" onclick="document.getElementById('cb-${idx}').click()">${sound.label}</span>
        <button class="play-single" onclick="event.stopPropagation(); playSingle(${idx})" title="Preview">&#9654;</button>
      </div>`;
    }

    html += '</div></div>';
  }

  container.innerHTML = html;
  document.querySelectorAll('.category-sounds').forEach(el => {
    el.style.maxHeight = el.scrollHeight + 'px';
  });
}

function toggleCategory(groupId, headerEl) {
  const el = document.getElementById(groupId);
  const arrow = headerEl.querySelector('.arrow');
  el.classList.toggle('collapsed');
  arrow.classList.toggle('collapsed');
  if (!el.classList.contains('collapsed')) {
    el.style.maxHeight = el.scrollHeight + 'px';
  }
}

function toggleSelectAll(groupId, btn) {
  const container = document.getElementById(groupId);
  const checkboxes = container.querySelectorAll('input[type="checkbox"]');
  const allChecked = Array.from(checkboxes).every(cb => cb.checked);
  checkboxes.forEach(cb => cb.checked = !allChecked);
  btn.textContent = allChecked ? 'Select all' : 'Deselect';
}

function getSelectedSounds() {
  const selected = [];
  document.querySelectorAll('.sound-list input[type="checkbox"]:checked').forEach(cb => {
    const idx = parseInt(cb.dataset.index);
    selected.push(allSounds[idx]);
  });
  return selected;
}

function getInterval() { return parseInt(document.getElementById('intervalSlider').value); }

function updateIntervalDisplay() {
  const seconds = getInterval() / 1000;
  const abs = Math.abs(seconds);
  const display = abs % 1 === 0 ? abs.toFixed(1) : (abs * 1000 % 100 === 0 ? abs.toFixed(2) : abs.toFixed(3));
  document.getElementById('intervalVal').textContent = `${seconds < 0 ? '-' : ''}${display}s`;
}

function playSingle(idx) {
  const sound = allSounds[idx];
  new Audio(sound.src).play().catch(() => {});
  showEffect(sound.label);
}

function advanceToNextTrack(selected, audio, delay) {
  if (!isPlaying || currentAudio !== audio) return;
  if (currentTimeout) { clearTimeout(currentTimeout); }

  currentTimeout = setTimeout(() => {
    if (!isPlaying || currentAudio !== audio) return;
    currentAudio = null;
    playNext(selected);
  }, delay);
}

function scheduleTrackAdvance(selected, audio) {
  const interval = getInterval();

  if (interval >= 0) return;

  const scheduleNegativeAdvance = () => {
    if (!isPlaying || currentAudio !== audio) return;
    if (!Number.isFinite(audio.duration) || audio.duration <= 0) return;

    const cutoffDelay = Math.max(0, Math.round(audio.duration * 1000 + interval));
    advanceToNextTrack(selected, audio, cutoffDelay);
  };

  if (audio.readyState >= 1 && Number.isFinite(audio.duration)) {
    scheduleNegativeAdvance();
    return;
  }

  audio.addEventListener('loadedmetadata', scheduleNegativeAdvance, { once: true });
}

function queueNextTrack(selected, audio) {
  const interval = getInterval();
  if (interval < 0) {
    advanceToNextTrack(selected, audio, 0);
    return;
  }

  advanceToNextTrack(selected, audio, interval);
}

function boostParticles(multiplier) {
  particleMultiplier = multiplier;
  setTimeout(() => { particleMultiplier = 1; }, 800);
}

function initParticles() {
  const canvas = document.getElementById('bgParticles');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  if (!ctx) return;

  const particles = [];

  function resize() {
    canvas.width = canvas.parentElement?.offsetWidth || 0;
    canvas.height = canvas.parentElement?.offsetHeight || 0;
  }

  function createParticle() {
    return {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 2 + 0.5,
      speedY: Math.random() * -1.5 - 0.5,
      speedX: (Math.random() - 0.5) * 0.8,
      opacity: Math.random() * 0.6 + 0.1,
      color: Math.random() > 0.4 ? '#FFD700' : (Math.random() > 0.5 ? '#FF4444' : '#FFA500')
    };
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(particle => {
      particle.y += particle.speedY * particleMultiplier;
      particle.x += particle.speedX + Math.sin(particle.y * 0.01) * 0.5;

      if (particle.y < -10) {
        particle.y = canvas.height + 10;
        particle.x = Math.random() * canvas.width;
      }

      ctx.globalAlpha = particle.opacity;
      ctx.fillStyle = particle.color;
      ctx.beginPath();
      ctx.arc(particle.x, particle.y, particle.size, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', resize);
  resize();

  for (let i = 0; i < 70; i++) {
    particles.push(createParticle());
  }

  animate();
}

function startDemo() {
  const selected = getSelectedSounds();
  if (selected.length === 0) return;
  stopDemo();
  isPlaying = true;
  currentIndex = 0;
  document.getElementById('btnStart').classList.add('playing');
  document.getElementById('idleHint').style.display = 'none';
  document.getElementById('idleGlow').style.display = 'none';
  playNext(selected);
}

function playNext(selected) {
  if (!isPlaying || currentIndex >= selected.length) { stopDemo(); return; }

  const sound = selected[currentIndex];
  document.querySelectorAll('.sound-item.now-playing').forEach(el => el.classList.remove('now-playing'));
  const itemEl = document.getElementById('item-' + sound.index);
  if (itemEl) {
    itemEl.classList.add('now-playing');
    itemEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }

  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio(sound.src);
  const audio = currentAudio;
  let trackSettled = false;
  const settleTrack = () => {
    if (trackSettled) return;
    trackSettled = true;
    queueNextTrack(selected, audio);
  };

  if (isSkipTailEnabled()) {
    detectRealDuration(sound.src).then(realDur => {
      if (!isPlaying || currentAudio !== audio) return;
      if (realDur != null) {
        const interval = getInterval();
        const delay = Math.max(0, Math.round(realDur * 1000 + interval));
        const skipTimer = setTimeout(() => {
          if (!isPlaying || currentAudio !== audio) return;
          audio.pause();
          if (trackSettled) return;
          trackSettled = true;
          currentAudio = null;
          playNext(selected);
        }, delay);
        // If audio ends naturally before our timer, clear it
        audio.addEventListener('ended', () => clearTimeout(skipTimer), { once: true });
      }
    });
  } else {
    scheduleTrackAdvance(selected, audio);
  }

  audio.addEventListener('ended', settleTrack, { once: true });
  audio.addEventListener('error', settleTrack, { once: true });
  audio.play().catch(() => {
    settleTrack();
  });
  showEffect(sound.label);

  currentIndex++;
}

function stopDemo() {
  isPlaying = false;
  if (currentTimeout) { clearTimeout(currentTimeout); currentTimeout = null; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  document.getElementById('btnStart').classList.remove('playing');
  document.querySelectorAll('.sound-item.now-playing').forEach(el => el.classList.remove('now-playing'));
  document.getElementById('idleHint').style.display = '';
  document.getElementById('idleGlow').style.display = '';
}

// ====== EFFECTS ======

function showEffect(label) {
  const { tier, enemy } = getEffectTier(label);
  const container = document.getElementById('effectContainer');
  const flash = document.getElementById('flashOverlay');
  const glow = document.getElementById('ambientGlow');
  const darkness = document.getElementById('darknessOverlay');

  // Clear previous
  container.querySelectorAll('.effect-text-wrap, .halo-ring, .slash-strike').forEach(el => el.remove());
  flash.style.animation = 'none';
  flash.offsetHeight;
  document.body.style.animation = 'none';
  document.body.offsetHeight;
  darkness.style.opacity = '0';

  // Color configs
  const colors = {
    normal: {
      grad: 'linear-gradient(180deg, #FFFDEB 0%, #FFD700 35%, #D48806 100%)',
      shadow: 'rgba(200,168,78,0.6)',
      ts: '0 2px 0 #8B6914, 0 4px 0 #6B4F10, 0 6px 10px rgba(0,0,0,0.8), 0 0 20px rgba(200,168,78,0.4)',
      flash: '',
      stroke: '1px #6B4F10'
    },
    double: {
      grad: 'linear-gradient(180deg, #FFFDE8 0%, #FFCC00 30%, #FF9900 100%)',
      shadow: 'rgba(255,200,0,0.8)',
      ts: '0 2px 0 #B8860B, 0 5px 0 #8B6508, 0 8px 15px rgba(0,0,0,0.9), 0 0 30px rgba(255,200,0,0.5)',
      flash: 'rgba(255,215,0,0.2)',
      stroke: '1.5px #8B6508'
    },
    triple: {
      grad: 'linear-gradient(180deg, #FFF5E0 0%, #FFB347 25%, #FF6600 100%)',
      shadow: 'rgba(255,140,0,0.8)',
      ts: '0 3px 0 #CC5500, 0 6px 0 #993300, 0 9px 18px rgba(0,0,0,0.9), 0 0 35px rgba(255,120,0,0.6)',
      flash: 'rgba(255,140,0,0.2)',
      stroke: '1.5px #993300'
    },
    quadra: {
      grad: 'linear-gradient(180deg, #FFFFFF 0%, #FFD700 18%, #FF4444 75%, #CC0000 100%)',
      shadow: 'rgba(255,60,0,0.8)',
      ts: '0 3px 0 #AA0000, 0 6px 0 #770000, 0 10px 22px rgba(0,0,0,1), 0 0 40px rgba(255,50,0,0.7)',
      flash: 'rgba(255,40,0,0.25)',
      stroke: '2px #770000'
    },
    penta: {
      grad: 'linear-gradient(180deg, #FFFFFF 0%, #FFE066 20%, #FFFFFF 45%, #FFD700 70%, #FFA500 100%)',
      shadow: 'rgba(255,215,0,1)',
      ts: '0 3px 0 #B8860B, 0 7px 0 #8B6508, 0 12px 30px rgba(0,0,0,1), 0 0 25px rgba(255,215,0,0.8), 0 0 40px rgba(255,200,0,0.4)',
      flash: 'rgba(255,215,0,0.4)',
      stroke: '2.5px #6B4F10'
    },
    streak: {
      grad: 'linear-gradient(180deg, #F0E0FF 0%, #D4A5FF 25%, #FFD700 65%, #B388FF 100%)',
      shadow: 'rgba(180,130,255,0.8)',
      ts: '0 2px 0 #6633AA, 0 5px 0 #4A2080, 0 8px 16px rgba(0,0,0,0.9), 0 0 30px rgba(160,100,240,0.6)',
      flash: 'rgba(160,100,240,0.15)',
      stroke: '1.5px #4A2080'
    },
  };

  const enemyColors = {
    double: { ...colors.double,
      grad: 'linear-gradient(180deg, #FFE0E0, #FF4444, #AA0000)',
      shadow: 'rgba(226,54,54,0.8)', ts: '0 2px 0 #880000, 0 5px 0 #550000, 0 8px 15px rgba(0,0,0,0.9), 0 0 30px rgba(226,54,54,0.5)',
      flash: 'rgba(226,54,54,0.2)', stroke: '1.5px #550000'
    },
    triple: { ...colors.triple,
      grad: 'linear-gradient(180deg, #FFD0D0, #FF2222, #880000)',
      shadow: 'rgba(200,0,0,0.8)', ts: '0 3px 0 #660000, 0 6px 0 #440000, 0 9px 18px rgba(0,0,0,0.9), 0 0 35px rgba(200,0,0,0.6)',
      flash: 'rgba(200,0,0,0.2)', stroke: '1.5px #440000'
    },
    quadra: { ...colors.quadra,
      grad: 'linear-gradient(180deg, #FFFFFF, #FF4444 30%, #CC0000 70%, #660000)',
      shadow: 'rgba(180,0,0,0.9)', ts: '0 3px 0 #550000, 0 6px 0 #330000, 0 10px 22px rgba(0,0,0,1), 0 0 40px rgba(180,0,0,0.7)',
      flash: 'rgba(180,0,0,0.25)', stroke: '2px #330000'
    },
    penta: { ...colors.penta,
      grad: 'linear-gradient(180deg, #FFFFFF, #FF6666 20%, #FFFFFF 45%, #FF0000 70%, #880000)',
      shadow: 'rgba(255,0,0,1)', ts: '0 3px 0 #880000, 0 7px 0 #550000, 0 12px 30px rgba(0,0,0,1), 0 0 40px rgba(255,0,0,0.9)',
      flash: 'rgba(255,0,0,0.4)', stroke: '2.5px #550000'
    },
    streak: { ...colors.streak,
      grad: 'linear-gradient(180deg, #FFD0D0, #FF6B6B, #CC3333)',
      shadow: 'rgba(226,54,54,0.8)', ts: '0 2px 0 #880000, 0 5px 0 #550000, 0 8px 16px rgba(0,0,0,0.9), 0 0 30px rgba(200,40,40,0.5)',
      flash: 'rgba(200,40,40,0.15)', stroke: '1.5px #550000'
    },
  };

  const c = (enemy && enemyColors[tier]) ? enemyColors[tier] : colors[tier] || colors.normal;

  // Font size: use vw-based sizing, much bigger
  const sizes = {
    normal: 'clamp(80px, 12vw, 160px)',
    double: 'clamp(90px, 14vw, 190px)',
    triple: 'clamp(95px, 15vw, 200px)',
    quadra: 'clamp(100px, 16vw, 220px)',
    penta:  'clamp(110px, 18vw, 250px)',
    streak: 'clamp(90px, 14vw, 190px)',
  };

  // 1. Strip technical modifiers like "(alt)" from the label. 
  // 2. These are meant for the catalog, not the epic UI. 
  // 3. This saves us from breaching the GPU 4096px texture limit width during big scale() transforms.
  const displayText = label.replace(/\s*\([^)]*\)\s*/g, '').trim();

  // Build dual-layer text
  const wrap = document.createElement('div');
  wrap.className = 'effect-text-wrap';

  // Shadow / 3D depth layer (underneath)
  const shadowEl = document.createElement('div');
  shadowEl.className = 'effect-text-shadow';
  shadowEl.textContent = displayText;
  shadowEl.style.fontSize = sizes[tier] || sizes.normal;
  shadowEl.style.textShadow = c.ts;
  shadowEl.style.webkitTextStroke = c.stroke;

  // Gradient layer (on top)
  const textEl = document.createElement('div');
  textEl.className = 'effect-text';
  textEl.textContent = displayText;
  textEl.style.fontSize = sizes[tier] || sizes.normal;
  textEl.style.background = c.grad;
  textEl.style.webkitBackgroundClip = 'text';
  textEl.style.webkitTextFillColor = 'transparent';
  textEl.style.backgroundClip = 'text';
  textEl.style.filter = `drop-shadow(0 0 35px ${c.shadow})`;

  wrap.appendChild(shadowEl);
  wrap.appendChild(textEl);
  container.appendChild(wrap);

  // Auto-fit: shrink font if text overflows container width
  const displayArea = document.getElementById('mainDisplay');
  const maxW = displayArea.clientWidth * 0.9;
  const maxH = displayArea.clientHeight * 0.8;
  let currentSize = parseFloat(getComputedStyle(textEl).fontSize);
  while (currentSize > 30 && (textEl.scrollWidth > maxW || textEl.scrollHeight > maxH)) {
    currentSize *= 0.9;
    const px = currentSize + 'px';
    textEl.style.fontSize = px;
    shadowEl.style.fontSize = px;
  }

  // Animation
  const anims = {
    normal: 'normalIn 2s ease forwards',
    double: 'doubleKill 2s ease forwards',
    triple: 'tripleKill 2.2s ease forwards',
    quadra: 'quadraKill 2.5s ease forwards',
    penta: 'pentaKill 3s ease forwards',
    streak: 'streakEffect 2.2s ease forwards',
  };
  wrap.style.animation = anims[tier] || anims.normal;

  // Flash
  if (c.flash) {
    flash.style.background = `radial-gradient(circle at center, ${c.flash}, transparent 70%)`;
    flash.style.animation = 'flashPulse 0.4s 0.09s ease-out forwards';
  }

  // Shake
  const shakes = {
    normal: 'shakeLight 0.3s',
    double: 'shakeLight 0.35s',
    triple: 'shakeHeavy 0.45s',
    quadra: 'shakeExtremeRGB 0.6s',
    penta: 'shakeExtremeRGB 0.85s',
    streak: 'shakeHeavy 0.4s'
  };
  const mainDisplay = document.getElementById('mainDisplay');
  mainDisplay.style.animation = 'none';
  void mainDisplay.offsetWidth; // force reflow
  mainDisplay.style.animation = (shakes[tier] || shakes.normal) + ' ease-in-out 0.09s';

  // Glow
  glow.classList.add('active');
  glow.style.background = `radial-gradient(circle, ${c.shadow.replace(/[\d.]+\)$/, '0.15)')} 0%, transparent 70%)`;

  if (tier === 'penta') {
    setTimeout(() => { boostParticles(5); }, 90);
  } else if (tier === 'quadra' || tier === 'triple') {
    setTimeout(() => { boostParticles(2.5); }, 90);
  }

  // Halo rings (quadra+)
  if (tier === 'quadra' || tier === 'penta') {
    const ringCount = tier === 'penta' ? 5 : 3;
    for (let i = 0; i < ringCount; i++) {
      const ring = document.createElement('div');
      ring.className = 'halo-ring';
      const size = 250 + i * 120;
      ring.style.width = ring.style.height = size + 'px';
      ring.style.left = '50%'; ring.style.top = '50%';
      ring.style.borderColor = c.shadow;
      ring.style.borderWidth = Math.max(1, 4 - i * 0.8) + 'px';
      // start at 0.09s, staggered
      ring.style.animation = `haloExpand ${0.5 + i * 0.12}s ${0.09 + i * 0.06}s ease-out forwards`;
      container.appendChild(ring);
    }
  }

  // Penta darkness flash
  if (tier === 'penta') {
    setTimeout(() => { 
      darkness.style.opacity = '0.75';
      setTimeout(() => { darkness.style.opacity = '0'; }, 200);
    }, 90);

    const slash = document.createElement('div');
    slash.className = 'slash-strike';
    if (enemy) {
      slash.style.boxShadow = '0 0 50px 20px rgba(255, 0, 0, 0.8), 0 0 100px 40px rgba(255, 100, 0, 0.5)';
    }
    container.insertBefore(slash, wrap);
  }

  // Cleanup
  const dur = tier === 'penta' ? 3200 : tier === 'quadra' ? 2700 : 2400;
  setTimeout(() => { glow.classList.remove('active'); }, dur);
}

init();
</script>
</body>
</html>
